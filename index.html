<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Piedra Papel Tijera</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>🎮 Piedra, Papel o Tijera</h1>

    <h2 id="result">Elige una opción para comenzar</h2>

    <div class="scoreboard">
        <div>Jugador: <span id="playerScore">0</span></div>
        <div>CPU: <span id="computerScore">0</span></div>
    </div>

    <div class="buttons">
        <button onclick="play('piedra')">🪨 Piedra</button>
        <button onclick="play('papel')">📄 Papel</button>
        <button onclick="play('tijera')">✂ Tijera</button>
    </div>

    <button class="reset" onclick="resetGame()">🔄 Reiniciar</button>

</div>

<script src="script.js"></script>

</body>
</html>
